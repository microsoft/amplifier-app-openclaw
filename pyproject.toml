[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "amplifier-app-openclaw"
version = "0.1.0"
description = "Amplifier × OpenClaw integration CLI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "amplifier-core>=1.0.0",
    "amplifier-foundation>=2.0.0",
    "click>=8.0",
]

[project.scripts]
amplifier-openclaw = "amplifier_app_openclaw.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/amplifier_app_openclaw"]
